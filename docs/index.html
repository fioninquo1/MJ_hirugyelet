<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Hirügyelet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-top">
            <h1 class="dashboard-title">MJ hirügyelet</h1>
            <div class="header-controls">
                <div class="view-switcher">
                    <button class="view-btn active" data-view="columns" title="Oszlopok">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                            <rect x="0" y="0" width="5" height="18" rx="1"/>
                            <rect x="6.5" y="0" width="5" height="18" rx="1"/>
                            <rect x="13" y="0" width="5" height="18" rx="1"/>
                        </svg>
                    </button>
                    <button class="view-btn" data-view="cards" title="Kartyak">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                            <rect x="0" y="0" width="8" height="8" rx="1.5"/>
                            <rect x="10" y="0" width="8" height="8" rx="1.5"/>
                            <rect x="0" y="10" width="8" height="8" rx="1.5"/>
                            <rect x="10" y="10" width="8" height="8" rx="1.5"/>
                        </svg>
                    </button>
                    <button class="view-btn" data-view="timeline" title="Idovonal">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                            <rect x="0" y="1" width="18" height="3" rx="1"/>
                            <rect x="0" y="7.5" width="18" height="3" rx="1"/>
                            <rect x="0" y="14" width="18" height="3" rx="1"/>
                        </svg>
                    </button>
                </div>
                <div class="search-box">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Kereses... (Ctrl+K)" autocomplete="off">
                </div>
                <button id="notify-btn" class="notify-btn" title="Ertesitesek">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 1.5A3.5 3.5 0 0 0 4.5 5v2.947c0 .346-.102.683-.294.97L3.05 10.78A.75.75 0 0 0 3.68 12h8.64a.75.75 0 0 0 .63-1.22l-1.156-1.862A1.75 1.75 0 0 1 11.5 7.947V5A3.5 3.5 0 0 0 8 1.5zM6.5 13a1.5 1.5 0 0 0 3 0h-3z"/>
                    </svg>
                </button>
                <button id="refresh-btn" class="refresh-btn" title="Frissites">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 1a7 7 0 0 0-7 7h2a5 5 0 0 1 9.17-2.74L10 7h5V2l-1.76 1.76A7 7 0 0 0 8 1zm7 7a5 5 0 0 1-9.17 2.74L8 9H3v5l1.76-1.76A7 7 0 0 0 15 8h-2z"/>
                    </svg>
                    <span class="refresh-text">Frissites</span>
                </button>
                <span id="new-count" class="new-count" style="display:none;"></span>
                <span id="last-updated" class="last-updated"></span>
            </div>
        </div>
        <div class="filter-bar" id="filter-bar"></div>
    </header>

    <main id="content" class="content columns-view"></main>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div id="error-banner" class="error-banner" style="display:none;"></div>

    <script src="app.js"></script>
</body>
</html>
